name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *' # 5h UTC = 6h CET / 7h CEST
  workflow_dispatch: {} # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPE_SECRET }}" \
            -H "Content-Type: application/json" \
            https://scrap-job.fly.dev/api/scrape \
            --max-time 600
