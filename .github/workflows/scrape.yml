name: Daily Scrape

on:
  schedule:
    - cron: '0 5 * * *' # 5h UTC = 6h CET / 7h CEST
  workflow_dispatch: {} # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          HTTP_CODE=$(curl -s -w '%{http_code}' -o /tmp/response.json -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPE_SECRET }}" \
            -H "Content-Type: application/json" \
            https://scrap-job.fly.dev/api/scrape \
            --max-time 600 \
            --retry 2 --retry-delay 30)
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/response.json
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Request failed with HTTP $HTTP_CODE"
            exit 1
          fi
