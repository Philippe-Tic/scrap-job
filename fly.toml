app = "scrap-job"
primary_region = "cdg"

[env]
  SCRAPE_DELAY_MS_MIN = "2000"
  SCRAPE_DELAY_MS_MAX = "5000"
  DEFAULT_SEARCH_KEYWORDS = "communication,graphiste,community manager"
  DEFAULT_SEARCH_LOCATION = "Rouen"
  DEFAULT_SEARCH_RADIUS_KM = "50"
  DATABASE_PATH = "./data/jobs.db"
  PORT = "8080"
  NODE_ENV = "production"


[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "scrap_job_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
